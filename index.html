    const SECTION_COLORS = {
      "WARM UP": "#4b5563", "PLYO": "#7c3aed", "SQUAT": "#d97706",
      "HAMS": "#d97706", "HINGE": "#d97706", "UNI": "#d97706",
      "CALF": "#b45309", "CORE": "#059669", "PRESS": "#dc2626",
      "ROW": "#2563eb", "CHEST": "#db2777", "PULL": "#2563eb",
      "NECK": "#6b7280", "ARMS": "#7c3aed", "FINISHER": "#059669",
      "CARRY": "#0891b2",
    };

    const TRACKER_META = Object.fromEntries(
      Object.entries(PROGRAM).flatMap(([day, exercises]) =>
        exercises.map(ex => [`${day}||${ex.name}`, { section: ex.section, sets: ex.sets, reps: ex.reps }])
      )
    );

    const STORAGE_KEY = "phase1-tracker-v1";
    const TYPES_KEY = "phase1-types-v1";
    const LAST_PHASE_KEY = "phase-tracker-last-phase";

    const PHASES = [
      { id: "phase1", label: "PHASE 1", status: "ACTIVE", description: "Current training tracker. Weeks, days, weights, cues, notes." },
      { id: "phase2", label: "PHASE 2", status: "READY", description: "Multi-device tracker with RPE support." },
      { id: "phase3", label: "PHASE 3", status: "PLANNED", description: "Future analysis, progression, and review layer." },
    ];

    const UI = {
      black: "#000000",
      surface: "#111111",
      raised: "#1A1A1A",
      border: "#222222",
      borderVisible: "#333333",
      disabled: "#666666",
      secondary: "#999999",
      primary: "#E8E8E8",
      display: "#FFFFFF",
      accent: "#D71921",
      success: "#4A9E5C",
      warning: "#D4A843",
      mono: "'Space Mono', monospace",
      sans: "'Space Grotesk', sans-serif",
      displayFont: "'Doto', 'Space Mono', monospace",
      ease: "all 0.18s cubic-bezier(0.25, 0.1, 0.25, 1)",
    };

    // Returns the weight logged in the most recent previous week
    function getPrevWeight(weights, day, exercise, currentWeek) {
      const weekIdx = WEEKS.indexOf(currentWeek);
      if (weekIdx <= 0) return null;
      for (let i = weekIdx - 1; i >= 0; i--) {
        const w = weights[`${day}||${exercise}`]?.[WEEKS[i]]?.weight;
        if (w) return { weight: w, week: WEEKS[i] };
      }
      return null;
    }

    const TYPE_OPTIONS = [
      { id: "bb",  label: "BB",  title: "Barbell" },
      { id: "db",  label: "DB",  title: "Dumbbell" },
      { id: "bw",  label: "BW",  title: "Bodyweight" },
    ];

    function TypeToggle({ value, onChange }) {
      return (
        <div style={{ display: "flex", gap: 3 }}>
          {TYPE_OPTIONS.map(opt => {
            const active = value === opt.id;
            const isBW = opt.id === "bw";
            return (
              <button
                key={opt.id}
                title={opt.title}
                onClick={() => onChange(active ? null : opt.id)}
                style={{
                  background: active ? UI.display : UI.black,
                  border: `1px solid ${active ? UI.display : UI.borderVisible}`,
                  borderRadius: 4, cursor: "pointer", padding: "4px 7px",
                  color: active ? UI.black : UI.disabled,
                  fontFamily: UI.mono,
                  fontWeight: 700, fontSize: 11, letterSpacing: "0.08em",
                  transition: UI.ease,
                }}
              >
                {opt.label}
              </button>
            );
          })}
        </div>
      );
    }

    function PhaseLanding({ onSelect, cloudUser, authEmail, setAuthEmail, authStatus, onLogin, phaseCompleted }) {
      return (
        <div style={{ minHeight: "100vh", padding: "28px 16px 64px", color: UI.primary, fontFamily: UI.sans }}>
          <div style={{ maxWidth: 720, margin: "0 auto" }}>
            <div style={{ fontFamily: UI.mono, fontSize: 11, letterSpacing: "0.1em", color: UI.secondary }}>TRAINING SYSTEM</div>
            <div style={{ fontFamily: UI.displayFont, fontSize: 68, lineHeight: 0.9, letterSpacing: "-0.06em", color: UI.display, marginTop: 12 }}>PHASES</div>
            <div style={{ fontSize: 16, lineHeight: 1.5, color: UI.secondary, marginTop: 18, maxWidth: 480 }}>
              Select a training phase. Returning sessions open the most recently used phase automatically.
            </div>

            <div style={{ display: "grid", gap: 10, marginTop: 48 }}>
              {PHASES.map((phase, index) => {
                const isActive = phase.id === "phase1";
                const canOpen = (isActive && !!cloudUser) || (isActive && phaseCompleted);
                const isComplete = phase.id === "phase1" && phaseCompleted;
                return (
                  <button
                    key={phase.id}
                    onClick={() => canOpen && onSelect(phase.id)}
                    disabled={!canOpen}
                    style={{
                      background: canOpen ? UI.surface : "rgba(17,17,17,0.58)",
                      border: `1px solid ${canOpen ? UI.borderVisible : UI.border}`,
                      borderLeft: `2px solid ${isComplete ? UI.success : (canOpen ? UI.accent : UI.border)}`,
                      borderRadius: 6,
                      padding: "18px 16px",
                      color: canOpen ? UI.primary : UI.disabled,
                      cursor: canOpen ? "pointer" : "not-allowed",
                      textAlign: "left",
                      transition: UI.ease,
                    }}
                  >
                    <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16 }}>
                      <div>
                        <div style={{ fontFamily: UI.mono, fontSize: 10, letterSpacing: "0.1em", color: canOpen ? UI.secondary : UI.disabled }}>0{index + 1} / {phase.status}</div>
                        <div style={{ fontSize: 24, lineHeight: 1.05, letterSpacing: "-0.03em", color: canOpen ? UI.display : UI.secondary, marginTop: 8 }}>{phase.label}</div>
                        <div style={{ fontSize: 13, lineHeight: 1.45, color: canOpen ? UI.secondary : UI.disabled, marginTop: 10 }}>{phase.description}</div>
                      </div>
                      <div style={{ fontFamily: UI.mono, fontSize: 11, letterSpacing: "0.08em", color: canOpen ? UI.accent : UI.disabled }}>
                        {isComplete ? "COMPLETE" : (canOpen ? "OPEN" : (isActive ? "LOGIN" : "LOCKED"))}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>

            {!cloudUser && (
              <div style={{ marginTop: 28, padding: 16, background: UI.surface, border: `1px solid ${UI.borderVisible}`, borderRadius: 6 }}>
                <div style={{ fontFamily: UI.mono, fontSize: 11, letterSpacing: "0.1em", color: UI.secondary }}>LOGIN REQUIRED FOR CLOUD</div>
                <div style={{ marginTop: 10, fontSize: 13, lineHeight: 1.5, color: UI.secondary }}>Use a magic link to connect this browser to Supabase.</div>
                <div style={{ display: "flex", gap: 8, marginTop: 14, flexWrap: "wrap" }}>
                  <input
                    value={authEmail}
                    onChange={(e) => setAuthEmail(e.target.value)}
                    placeholder="EMAIL"
                    style={{
                      flex: "1 1 220px",
                      background: UI.black,
                      border: `1px solid ${UI.borderVisible}`,
                      borderRadius: 4,
                      padding: "9px 10px",
                      color: UI.primary,
                      fontSize: 11,
                      fontFamily: UI.mono,
                      letterSpacing: "0.04em",
                      outline: "none",
                    }}
                  />
                  <button
                    onClick={onLogin}
                    disabled={authStatus === "sending"}
                    style={{
                      background: UI.display,
                      border: `1px solid ${UI.display}`,
                      borderRadius: 4,
                      padding: "9px 11px",
                      color: UI.black,
                      fontFamily: UI.mono,
                      fontWeight: 700,
                      fontSize: 11,
                      letterSpacing: "0.08em",
                      cursor: "pointer",
                    }}
                  >
                    {authStatus === "sending" ? "SENDING" : "SEND LINK"}
                  </button>
                </div>
                {authStatus === "sent" && <div style={{ marginTop: 10, fontFamily: UI.mono, fontSize: 11, color: UI.success }}>LINK SENT</div>}
                {authStatus === "error" && <div style={{ marginTop: 10, fontFamily: UI.mono, fontSize: 11, color: UI.accent }}>LOGIN FAILED</div>}
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [activeDay, setActiveDay] = useState("Day 1");
      const [activeWeek, setActiveWeek] = useState("W1");
      const [weights, setWeights] = useState({});
      const [types, setTypes] = useState({});   // { "Day 1||Back Squat": "bb" | "db" | "bw" | null }
      const [expandedCue, setExpandedCue] = useState(null);
      const [collapsedSections, setCollapsedSections] = useState({});
      const [saveStatus, setSaveStatus] = useState("");
      const [syncStatus, setSyncStatus] = useState("idle");
      const [importStatus, setImportStatus] = useState("idle");
      const [cloudUser, setCloudUser] = useState(null);
      const [authEmail, setAuthEmail] = useState(() => {
        try { return window.SUPABASE_LOGIN_EMAIL || ""; } catch (_) { return ""; }
      });
      const [authStatus, setAuthStatus] = useState("idle");
      const [selectedPhase, setSelectedPhase] = useState(() => {
        try { return localStorage.getItem(LAST_PHASE_KEY) || null; } catch (_) { return null; }
      });
      const [phaseCompleted, setPhaseCompleted] = useState(() => {
        try { return localStorage.getItem("phase1_completed") === "true"; } catch (_) { return false; }
      });

      const isPhaseComplete = useCallback(() => {
        const weekKeys = ["W1", "W2", "W3", "W4"];
        let total = 0, logged = 0;
        for (const day of Object.keys(PROGRAM)) {
          if (day === "Day 5 (Optional)") continue;
          const exercises = PROGRAM[day].filter(e => e.section !== "WARM UP");
          for (const ex of exercises) {
            for (const wk of weekKeys) {
              total++;
              const key = `${day}||${ex.name}`;
              if (weights[key]?.[wk]?.weight || types[key] === "bw") { logged++; }
            }
          }
        }
        return total > 0 && logged >= total;
      }, [weights, types]);

      const openPhase = (phaseId) => {
        setSelectedPhase(phaseId);
        try { localStorage.setItem(LAST_PHASE_KEY, phaseId); } catch (_) {}
      };

      useEffect(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) setWeights(JSON.parse(saved));
          const savedTypes = localStorage.getItem(TYPES_KEY);
          if (savedTypes) setTypes(JSON.parse(savedTypes));
        } catch (_) {}
      }, []);

      useEffect(() => {
        let alive = true;

        const syncFromCloud = async () => {
          if (!window.supabase?.getSession) return;
          const { session } = await window.supabase.getSession();
          const user = session?.user || null;
          if (!alive || !user) return;
          setCloudUser(user);

          const remote = await window.supabase.hydrateTrackerStateFromSupabase(user.id);
          if (!alive) return;

          const remoteHasData = Object.keys(remote?.weights || {}).length > 0;
          if (remoteHasData) {
            setWeights(remote.weights);
            setTypes(remote.types);
            try {
              localStorage.setItem(STORAGE_KEY, JSON.stringify(remote.weights));
              localStorage.setItem(TYPES_KEY, JSON.stringify(remote.types));
            } catch (_) {}
            return;
          }

          const migrated = await window.supabase.migrateLocalToSupabaseIfNeeded(user.id);
          if (!alive || migrated?.error) return;
          if ((migrated?.migrated || 0) > 0) {
            const refreshed = await window.supabase.hydrateTrackerStateFromSupabase(user.id);
            if (!alive) return;
            setWeights(refreshed.weights || {});
            setTypes(refreshed.types || {});
            try {
              localStorage.setItem(STORAGE_KEY, JSON.stringify(refreshed.weights || {}));
              localStorage.setItem(TYPES_KEY, JSON.stringify(refreshed.types || {}));
            } catch (_) {}
          }
        };

        syncFromCloud();
        return () => { alive = false; };
      }, []);

      const sendLoginLink = async () => {
        if (!authEmail.trim() || !window.supabase?.sendMagicLink) {
          setAuthStatus("error");
          setTimeout(() => setAuthStatus("idle"), 2000);
          return;
        }
        setAuthStatus("sending");
        const res = await window.supabase.sendMagicLink(authEmail.trim());
        if (res?.error) {
          setAuthStatus("error");
          setTimeout(() => setAuthStatus("idle"), 3000);
          return;
        }
        setAuthStatus("sent");
        setTimeout(() => setAuthStatus("idle"), 4000);
      };

      const save = useCallback((newWeights) => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(newWeights));
          localStorage.setItem(LAST_PHASE_KEY, "phase1");
          setSaveStatus("saved");
          setTimeout(() => setSaveStatus(""), 1200);
        } catch (_) {}
      }, []);

      const saveTypes = useCallback((newTypes) => {
        try {
          localStorage.setItem(TYPES_KEY, JSON.stringify(newTypes));
          localStorage.setItem(LAST_PHASE_KEY, "phase1");
        } catch (_) {}
      }, []);

      const handleWeight = (day, exercise, value) => {
        const key = `${day}||${exercise}`;
        const updated = {
          ...weights,
          [key]: { ...(weights[key] || {}), [activeWeek]: { ...(weights[key]?.[activeWeek] || {}), weight: value } }
        };
        setWeights(updated);
        save(updated);
      };

      const handleComment = (day, exercise, value) => {
        const key = `${day}||${exercise}`;
        const updated = {
          ...weights,
          [key]: { ...(weights[key] || {}), [activeWeek]: { ...(weights[key]?.[activeWeek] || {}), comment: value } }
        };
        setWeights(updated);
        save(updated);
      };

      const handleType = (day, exercise, typeVal) => {
        const key = `${day}||${exercise}`;
        const updated = { ...types, [key]: typeVal };
        setTypes(updated);
        saveTypes(updated);
        // If switching to BW, clear the weight input for current week
        if (typeVal === "bw") {
          handleWeight(day, exercise, "");
        }
      };

      const getVal = (day, exercise, field) =>
        weights[`${day}||${exercise}`]?.[activeWeek]?.[field] || "";

      const getType = (day, exercise) =>
        types[`${day}||${exercise}`] || null;

      const syncToCloud = async () => {
        if (!cloudUser?.id || !window.supabase?.upsertTrackerStateToSupabase) {
          setSyncStatus("error");
          setTimeout(() => setSyncStatus("idle"), 2000);
          return;
        }
        setSyncStatus("syncing");
        const payload = { userId: cloudUser.id, weights, types, metaByKey: TRACKER_META };
        const result = await window.supabase.upsertTrackerStateToSupabase(payload);
        if (result?.error) {
          setSyncStatus("error");
          setTimeout(() => setSyncStatus("idle"), 3000);
          return;
        }
        if (!Object.keys(weights).length) {
          setSyncStatus("empty");
          setTimeout(() => setSyncStatus("idle"), 2500);
          return;
        }
        setSyncStatus("ok");
        setTimeout(() => setSyncStatus("idle"), 3000);
      };

      const importFromCloud = async () => {
        if (!cloudUser?.id || !window.supabase?.hydrateTrackerStateFromSupabase) {
          setImportStatus("error");
          setTimeout(() => setImportStatus("idle"), 2000);
          return;
        }
        setImportStatus("importing");
        const remote = await window.supabase.hydrateTrackerStateFromSupabase(cloudUser.id);
        const rowsLoaded = Object.keys(remote?.weights || {}).length;
        if (!rowsLoaded) {
          setImportStatus("empty");
          setTimeout(() => setImportStatus("idle"), 2500);
          return;
        }
        setWeights(remote.weights || {});
        setTypes(remote.types || {});
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(remote.weights || {}));
          localStorage.setItem(TYPES_KEY, JSON.stringify(remote.types || {}));
          localStorage.setItem(LAST_PHASE_KEY, "phase1");
        } catch (_) {}
        setImportStatus("ok");
        setTimeout(() => setImportStatus("idle"), 3000);
      };

      const exercises = PROGRAM[activeDay] || [];
      const sections = [...new Set(exercises.map(e => e.section))];
      const workingExercises = exercises.filter(e => e.section !== "WARM UP");
      const loggedCount = workingExercises.filter(e => getVal(activeDay, e.name, "weight") || getType(activeDay, e.name) === "bw").length;
      const progressLabel = `${loggedCount}/${workingExercises.length}`;
      const activeWeekLabel = `Week ${activeWeek.match(/\d+/)?.[0] || ""}`.trim();

      const syncStyles = {
        idle:    { bg: UI.black, border: UI.borderVisible, color: UI.secondary, label: cloudUser ? "SYNC CLOUD" : "CLOUD LOCKED" },
        syncing: { bg: UI.black, border: UI.borderVisible, color: UI.disabled, label: "SYNCING" },
        ok:      { bg: UI.black, border: UI.success, color: UI.success, label: "SAVED CLOUD" },
        empty:   { bg: "rgba(215,25,33,0.15)", border: UI.accent, color: UI.accent, label: "NO DATA" },
        error:   { bg: "rgba(215,25,33,0.15)", border: UI.accent, color: UI.accent, label: "SYNC ERROR" },
      }[syncStatus];

      const importStyles = {
        idle:      { bg: UI.black, border: UI.borderVisible, color: UI.secondary, label: cloudUser ? "LOAD CLOUD" : "CLOUD LOCKED" },
        importing: { bg: UI.black, border: UI.borderVisible, color: UI.disabled, label: "IMPORTING" },
        ok:        { bg: UI.black, border: UI.success, color: UI.success, label: "LOADED" },
        empty:     { bg: "rgba(215,25,33,0.15)", border: UI.accent, color: UI.accent, label: "NO ROWS" },
        error:     { bg: "rgba(215,25,33,0.15)", border: UI.accent, color: UI.accent, label: "IMPORT ERROR" },
      }[importStatus];

      if (selectedPhase !== "phase1" || (!cloudUser && !phaseCompleted)) {
        return <PhaseLanding onSelect={openPhase} cloudUser={cloudUser} authEmail={authEmail} setAuthEmail={setAuthEmail} authStatus={authStatus} onLogin={sendLoginLink} phaseCompleted={phaseCompleted} />;
      }

      return (
        <div style={{ fontFamily: UI.sans, background: "transparent", minHeight: "100vh", color: UI.primary, paddingBottom: 80 }}>

          {/* Header */}
          <div style={{ background: "rgba(0,0,0,0.94)", borderBottom: `1px solid ${UI.border}`, padding: "20px 16px 18px", position: "sticky", top: 0, zIndex: 10 }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16 }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                <div style={{ fontFamily: UI.displayFont, fontSize: 44, lineHeight: 0.9, letterSpacing: "-0.06em", color: UI.display }}>PHASE 1</div>
                <div style={{ paddingTop: 2 }}>
                  <div style={{ fontSize: 24, lineHeight: 1.08, letterSpacing: "-0.03em", color: UI.display, marginTop: 3 }}>{activeWeekLabel}</div>
                  <div style={{ fontFamily: UI.mono, fontSize: 11, letterSpacing: "0.08em", color: UI.disabled, marginTop: 7 }}>{progressLabel} WORKING SETS LOGGED</div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 8, flexDirection: "column" }}>
                {saveStatus === "saved" && <div style={{ fontSize: 11, color: UI.success, fontFamily: UI.mono, letterSpacing: "0.08em" }}>[SAVED]</div>}
                <div style={{ fontFamily: UI.mono, fontSize: 10, color: UI.disabled, letterSpacing: "0.08em" }}>
                  {cloudUser ? `CLOUD / ${cloudUser.email || cloudUser.id}` : "CLOUD / OFFLINE"}
                </div>
                <button onClick={importFromCloud} disabled={importStatus === "importing" || !cloudUser} style={{
                  background: importStyles.bg, border: `1px solid ${importStyles.border}`,
                  borderRadius: 4, cursor: importStatus === "importing" || !cloudUser ? "default" : "pointer",
                  padding: "8px 11px", color: importStyles.color,
                  fontFamily: UI.mono,
                  fontWeight: 700, fontSize: 11, letterSpacing: "0.08em",
                  transition: UI.ease, whiteSpace: "nowrap"
                }}>
                  {importStyles.label}
                </button>
                <button onClick={syncToCloud} disabled={syncStatus === "syncing" || !cloudUser} style={{
                  background: syncStyles.bg, border: `1px solid ${syncStyles.border}`,
                  borderRadius: 4, cursor: syncStatus === "syncing" || !cloudUser ? "default" : "pointer",
                  padding: "8px 11px", color: syncStyles.color,
                  fontFamily: UI.mono,
                  fontWeight: 700, fontSize: 11, letterSpacing: "0.08em",
                  transition: UI.ease, whiteSpace: "nowrap"
                }}>
                  {syncStyles.label}
                </button>
              </div>
            </div>
            <div style={{ marginTop: 16, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setSelectedPhase(null)} style={{ background: UI.black, border: `1px solid ${UI.borderVisible}`, borderRadius: 4, padding: "7px 10px", color: UI.secondary, fontFamily: UI.mono, fontWeight: 700, fontSize: 11, letterSpacing: "0.08em", cursor: "pointer" }}>
                  ALL PHASES
                </button>
                {!phaseCompleted && isPhaseComplete() && (
                  <button onClick={() => {
                    if (confirm("End Phase 1? This will freeze the phase and mark it as complete.")) {
                      setPhaseCompleted(true);
                      try { localStorage.setItem("phase1_completed", "true"); } catch (_) {}
                    }
                  }} style={{ background: UI.accent, border: `1px solid ${UI.accent}`, borderRadius: 4, padding: "7px 10px", color: UI.black, fontFamily: UI.mono, fontWeight: 700, fontSize: 11, letterSpacing: "0.08em", cursor: "pointer" }}>
                    END PHASE
                  </button>
                )}
                {phaseCompleted && (
                  <button onClick={() => {
                    if (confirm("Reopen Phase 1 for edits? This will allow new entries.")) {
                      setPhaseCompleted(false);
                      try { localStorage.setItem("phase1_completed", "false"); } catch (_) {}
                    }
                  }} style={{ background: UI.black, border: `1px solid ${UI.warning}`, borderRadius: 4, padding: "7px 10px", color: UI.warning, fontFamily: UI.mono, fontWeight: 700, fontSize: 11, letterSpacing: "0.08em", cursor: "pointer" }}>
                    EDIT LOG
                  </button>
                )}
                {phaseCompleted && (
                  <button onClick={() => {
                    const rows = [];
                    rows.push(["Exercise", "Section", "Week", "Day", "Weight", "Type", "Comment"].join(","));
                    for (const day of Object.keys(PROGRAM)) {
                      for (const ex of PROGRAM[day]) {
                        for (const wk of ["W1", "W2", "W3", "W4", "W5 (Deload)"]) {
                          const key = `${day}||${ex.name}`;
                          const w = weights[key]?.[wk];
                          if (w?.weight) {
                            rows.push([`"${ex.name}"`, `"${ex.section}"`, `"${wk}"`, `"${day}"`, w.weight || "", `"${types[key] || ""}"`, `"${(w.comment || "").replace(/"/g, '""')}"`].join(","));
                          }
                        }
                      }
                    }
                    const csv = rows.join("\n");
                    const blob = new Blob([csv], { type: "text/csv" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `phase1_export_${new Date().toISOString().slice(0, 10)}.csv`;
                    a.click();
                    URL.revokeObjectURL(url);
                  }} style={{ background: UI.black, border: `1px solid ${UI.borderVisible}`, borderRadius: 4, padding: "7px 10px", color: UI.secondary, fontFamily: UI.mono, fontWeight: 700, fontSize: 11, letterSpacing: "0.08em", cursor: "pointer" }}>
                    EXPORT CSV
                  </button>
                )}
              </div>
            </div>
          </div>

          {/* Week Tabs */}
          <div style={{ background: UI.black, borderBottom: `1px solid ${UI.border}`, padding: "0 16px", display: "flex", gap: 0, overflowX: "auto" }}>
            {WEEKS.map(w => (
              <button key={w} onClick={() => setActiveWeek(w)} style={{
                background: "none", border: "none", cursor: "pointer",
                padding: "13px 14px", fontSize: 11, fontWeight: 700, letterSpacing: "0.08em",
                fontFamily: UI.mono,
                color: activeWeek === w ? UI.display : UI.disabled,
                borderBottom: activeWeek === w ? `1px solid ${UI.accent}` : "1px solid transparent",
                whiteSpace: "nowrap"
              }}>
                {w === "W5 (Deload)" ? "W5 DELOAD" : w}
              </button>
            ))}
          </div>

          {/* Day Selector */}
          <div style={{ padding: "16px", display: "flex", gap: 8, overflowX: "auto" }}>
            {DAYS.map(d => {
              const dayEx = PROGRAM[d] || [];
              const logged = dayEx.filter(e => getVal(d, e.name, "weight") || getType(d, e.name) === "bw").length;
              return (
                <button key={d} onClick={() => setActiveDay(d)} style={{
                  background: activeDay === d ? UI.display : UI.black,
                  border: `1px solid ${activeDay === d ? UI.display : UI.borderVisible}`,
                  borderRadius: 4, cursor: "pointer", padding: "9px 12px",
                  color: activeDay === d ? UI.black : UI.secondary,
                  fontFamily: UI.mono,
                  fontWeight: 700, fontSize: 11, letterSpacing: "0.08em", whiteSpace: "nowrap", minWidth: 70,
                  transition: UI.ease
                }}>
                  <div>{d.split(" ").slice(0, 2).join(" ").toUpperCase()}</div>
                  <div style={{ fontSize: 10, fontWeight: 400, opacity: 0.62, marginTop: 4 }}>{logged}/{dayEx.length}</div>
                </button>
              );
            })}
          </div>

          {/* Deload Banner */}
          {activeWeek === "W5 (Deload)" && (
            <div style={{ margin: "0 16px 24px", padding: "12px 14px", background: UI.black, border: `1px solid ${UI.warning}`, borderRadius: 4, fontFamily: UI.mono, fontSize: 11, color: UI.warning, lineHeight: 1.5, letterSpacing: "0.03em" }}>
              [DELOAD] CUT LOADS 40-50%. 2 SETS PER EXERCISE. EASY IS THE POINT.
            </div>
          )}

          {/* Exercises */}
          <div style={{ padding: "0 16px" }}>
            {sections.map(section => {
              const sectionExercises = exercises.filter(e => e.section === section);
              const color = SECTION_COLORS[section] || "#888";
              const sectionLoggedCount = sectionExercises.filter(e => getVal(activeDay, e.name, "weight") || getType(activeDay, e.name) === "bw").length;
              const isWarmUp = section === "WARM UP";
              const isWarmUpComplete = isWarmUp && sectionExercises.length > 0 && sectionLoggedCount === sectionExercises.length;
              const isCollapsed = isWarmUp && (collapsedSections[section] ?? isWarmUpComplete);
              return (
                <div key={section} style={{ marginBottom: 32 }}>
                  <button
                    onClick={() => isWarmUp && setCollapsedSections(prev => ({ ...prev, [section]: !isCollapsed }))}
                    style={{
                      width: "100%",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "space-between",
                      gap: 12,
                      marginBottom: isCollapsed ? 0 : 12,
                      background: "none",
                      border: "none",
                      padding: 0,
                      cursor: isWarmUp ? "pointer" : "default",
                      textAlign: "left",
                    }}
                  >
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 8, height: 8, background: color, borderRadius: 99 }} />
                      <span style={{ fontFamily: UI.mono, fontWeight: 700, fontSize: 11, letterSpacing: "0.1em", color: UI.secondary }}>{section}</span>
                    </div>
                    <span style={{ fontFamily: UI.mono, fontSize: 10, letterSpacing: "0.08em", color: UI.disabled }}>
                      {isWarmUp ? `${sectionLoggedCount}/${sectionExercises.length} ${isCollapsed ? "OPEN" : "CLOSE"}` : `${sectionExercises.length} ITEMS`}
                    </span>
                  </button>

                  {!isCollapsed && sectionExercises.map(ex => {
                    const wVal = getVal(activeDay, ex.name, "weight");
                    const cVal = getVal(activeDay, ex.name, "comment");
                    const exType = getType(activeDay, ex.name);
                    const isBW = exType === "bw";
                    const isExpanded = expandedCue === `${activeDay}||${ex.name}`;
                    const prev = getPrevWeight(weights, activeDay, ex.name, activeWeek);
                    const isLogged = wVal || isBW;

                    return (
                      <div key={ex.name} style={{
                        background: isLogged ? UI.surface : "rgba(17,17,17,0.78)",
                        border: `1px solid ${isLogged ? UI.borderVisible : UI.border}`,
                        borderLeft: `2px solid ${isLogged ? color : UI.border}`,
                        borderRadius: 6, marginBottom: 8,
                        boxShadow: "none"
                      }}>
                        <div style={{ padding: "13px 14px" }}>
                          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12 }}>

                            {/* Left: name + badges */}
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 15, fontWeight: 500, color: isLogged ? UI.display : UI.primary, lineHeight: 1.25, letterSpacing: "-0.01em" }}>{ex.name}</div>
                              <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap", alignItems: "center" }}>
                                <span style={{ fontFamily: UI.mono, fontSize: 10, color: UI.disabled, background: UI.black, border: `1px solid ${UI.border}`, borderRadius: 3, padding: "3px 6px" }}>{ex.sets}x{ex.reps}</span>
                                <span style={{ fontFamily: UI.mono, fontSize: 10, color: UI.disabled, background: UI.black, border: `1px solid ${UI.border}`, borderRadius: 3, padding: "3px 6px" }}>RPE {ex.rpe}</span>
                                {prev && (
                                  <span style={{ fontFamily: UI.mono, fontSize: 10, color: UI.warning, background: UI.black, border: `1px solid ${UI.borderVisible}`, borderRadius: 3, padding: "3px 6px" }}>
                                    {prev.week}: {prev.weight}{isBW ? "" : "kg"}
                                  </span>
                                )}
                              </div>
                            </div>

                            {/* Right: type toggle + weight input */}
                            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
                              <input
                                type="text"
                                inputMode="decimal"
                                placeholder={isBW ? "BW" : "kg"}
                                value={isBW ? "" : wVal}
                                disabled={isBW}
                                onChange={e => handleWeight(activeDay, ex.name, e.target.value)}
                                style={{
                                  width: 72, background: isBW ? UI.surface : UI.black,
                                  border: `1px solid ${wVal && !isBW ? UI.display : isBW ? UI.borderVisible : UI.borderVisible}`,
                                  borderRadius: 4, padding: "7px 9px",
                                  color: isBW ? UI.disabled : wVal ? UI.display : UI.disabled,
                                  fontSize: 13, fontFamily: UI.mono,
                                  fontWeight: 700, outline: "none", textAlign: "center",
                                  letterSpacing: "0.02em"
                                }}
                              />
                              <TypeToggle value={exType} onChange={(t) => handleType(activeDay, ex.name, t)} />
                              {ex.cue && (
                                <button onClick={() => setExpandedCue(isExpanded ? null : `${activeDay}||${ex.name}`)} style={{
                                  background: "none", border: "none", cursor: "pointer",
                                  color: UI.disabled, fontSize: 10, padding: 0,
                                  fontFamily: UI.mono, letterSpacing: "0.08em"
                                }}>
                                  {isExpanded ? "HIDE CUE" : "SHOW CUE"}
                                </button>
                              )}
                            </div>
                          </div>

                          {isExpanded && ex.cue && (
                            <div style={{ marginTop: 12, padding: "9px 10px", background: UI.black, borderRadius: 4, borderLeft: `2px solid ${color}`, fontSize: 12, color: UI.secondary, lineHeight: 1.5 }}>
                              {ex.cue}
                            </div>
                          )}

                          <input
                            type="text" placeholder="notes..."
                            value={cVal}
                            onChange={e => handleComment(activeDay, ex.name, e.target.value)}
                            style={{
                              width: "100%", marginTop: 10, background: UI.black,
                              border: `1px solid ${UI.border}`, borderRadius: 4, padding: "7px 9px",
                              color: UI.secondary, fontSize: 12, outline: "none", fontFamily: UI.sans
                            }}
                          />
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
