name: coach-review

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate coach review
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/coachReview.mjs
      - name: Commit report if one was written
        run: |
          if [ -n "$(git status --porcelain reports/)" ]; then
            git config user.name "coach-review-bot"
            git config user.email "noreply@github.com"
            git add reports/
            git commit -m "Weekly coach review"
            git push
          else
            echo "No report generated — nothing to commit."
          fi
